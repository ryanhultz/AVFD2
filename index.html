<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Aurelius Fire & Rescue — Run Report</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5ede0; min-height: 100vh; }
    button { cursor: pointer; font-family: Georgia, serif; }
    input, select, textarea { font-family: Georgia, serif; }

    /* ── Header ── */
    #app-header {
      background: linear-gradient(135deg, #8b0000 0%, #5a0000 100%);
      color: #fff;
      padding: 13px 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    #header-eyebrow { font-size: 10px; letter-spacing: 0.15em; opacity: 0.7; text-transform: uppercase; }
    #header-title   { font-size: 18px; font-weight: 700; }
    #header-sub     { font-size: 11px; opacity: 0.65; margin-bottom: 7px; }
    #tab-bar {
      display: flex;
      overflow-x: auto;
      margin: 0 -16px;
      scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none;
      border: none;
      padding: 7px 11px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #ffcc00; }

    /* ── Content ── */
    #content { padding: 14px; max-width: 640px; margin: 0 auto; }
    #tab-content { margin-top: 14px; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 10px;
      border: 1.5px solid #e0c9a6;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .card-title {
      background: #8b0000;
      color: #fff;
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .card-body { padding: 13px 13px 10px; }

    /* ── Form fields ── */
    .lbl {
      font-size: 11px;
      font-weight: 700;
      color: #8b0000;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .inp, .sel, .ta {
      width: 100%;
      background: #fff8f0;
      border: 1.5px solid #c8a97a;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 15px;
      color: #1a1a1a;
      outline: none;
      font-family: Georgia, serif;
    }
    .ta { resize: vertical; }
    .field-row { margin-bottom: 10px; }
    .flex-row { display: flex; gap: 10px; }
    .flex-1 { flex: 1; }
    .flex-2 { flex: 2; }

    /* ── Toggle ── */
    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f5ede0;
      border: 1.5px solid #c8a97a;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 7px;
      transition: all 0.15s;
    }
    .toggle.on { background: #8b0000; border-color: #8b0000; }
    .toggle-box {
      width: 18px; height: 18px;
      border-radius: 4px;
      background: #c8a97a;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 900;
      color: transparent;
    }
    .toggle.on .toggle-box { background: #fff; color: #8b0000; }
    .toggle-label { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    .toggle-sub   { font-size: 11px; color: #888; }
    .toggle.on .toggle-label { color: #fff; }
    .toggle.on .toggle-sub   { color: #ffcccc; }

    /* ── Nav buttons ── */
    #nav-row { display: flex; gap: 10px; margin-top: 8px; margin-bottom: 20px; }
    .btn-back  { flex:1; background:#fff; color:#8b0000; border:2px solid #8b0000; border-radius:10px; padding:12px 0; font-size:15px; font-weight:700; }
    .btn-save  { flex:1; background:#555; color:#fff; border:none; border-radius:10px; padding:12px 0; font-size:15px; font-weight:700; transition:background 0.2s; }
    .btn-save.saved { background: #2d6a2d; }
    .btn-next  { flex:1; background:#8b0000; color:#fff; border:none; border-radius:10px; padding:12px 0; font-size:15px; font-weight:700; }
    .btn-print { width:100%; background:#8b0000; color:#fff; border:none; border-radius:10px; padding:15px 0; font-size:17px; font-weight:700; letter-spacing:0.05em; margin-bottom:10px; }
    .btn-clear { width:100%; background:none; color:#aaa; border:1px solid #ddd; border-radius:8px; padding:8px 0; font-size:12px; margin-bottom:30px; }

    /* ── Preview summary ── */
    #preview-summary {
      border: 1px solid #ccc; border-radius: 6px;
      padding: 10px; background: #fafafa;
      font-size: 12px; line-height: 1.7;
    }
    #preview-summary .ps-title {
      font-weight: 700; font-size: 13px;
      border-bottom: 1px solid #ccc;
      margin-bottom: 6px; padding-bottom: 3px;
    }

    /* ════════════════════════════════
       PRINT FORM — hidden on screen
       ════════════════════════════════ */
    #print-form { display: none; }

    .rpt {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 9pt;
      color: #000;
      width: 100%;
      padding: 0.35in;
    }
    .rpt-title {
      font-size: 15pt; font-weight: bold;
      text-align: center; letter-spacing: 0.06em;
      border-bottom: 2px solid #000;
      padding-bottom: 4px; margin-bottom: 8px;
    }
    .rpt table { border-collapse: collapse; width: 100%; margin-bottom: 4px; }
    .rpt td { border: 1px solid #000; padding: 2px 4px; vertical-align: top; font-size: 8.5pt; }
    .rpt .bl { font-weight: bold; font-size: 7.5pt; white-space: nowrap; }
    .rpt .ul { border-bottom: 1px solid #000; display: inline-block; min-height: 13px; padding-bottom: 1px; }
    .rpt .sec-hdr {
      font-weight: bold; font-size: 7.5pt;
      background: #ddd; border: 1px solid #000;
      padding: 2px 5px; border-bottom: none;
      text-transform: uppercase; letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .rpt .chkbox {
      display: inline-block;
      width: 9px; height: 9px;
      border: 1px solid #000;
      text-align: center; line-height: 9px;
      font-size: 8pt; margin-right: 3px; flex-shrink: 0;
      vertical-align: middle;
    }
    .rpt .chkbox.on { background: #000; color: #fff; font-weight: bold; }
    .rpt .disp-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .disp-item {
      flex: 0 0 50%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      display: flex; align-items: center; gap: 3px; font-size: 8pt;
    }
    .rpt .disp-item.full { flex: 0 0 100%; border-right: none; }
    .rpt .disp-item:nth-child(even) { border-right: none; }
    .rpt .loc-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .loc-item {
      flex: 0 0 25%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      display: flex; align-items: center; gap: 3px; font-size: 7.5pt;
    }
    .rpt .loc-item:nth-child(4n) { border-right: none; }
    .rpt .pers-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .pers-item {
      flex: 0 0 50%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      display: flex; align-items: center; gap: 3px; font-size: 8pt;
    }
    .rpt .pers-item:nth-child(even) { border-right: none; }
    .rpt .app-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .app-item {
      flex: 0 0 20%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      font-size: 7.5pt;
    }
    .rpt .app-item:nth-child(5n) { border-right: none; }
    .rpt .remarks-box {
      border: 1px solid #000; min-height: 55pt;
      padding: 4px; font-size: 8.5pt;
      white-space: pre-wrap; margin-bottom: 4px;
    }
    .rpt .footer-row {
      display: flex; justify-content: space-between;
      border-top: 1px solid #000; padding-top: 3px; font-size: 8pt;
      margin-top: 4px;
    }
    .page2 { padding: 0.35in; }
    .page2-title { font-size: 14pt; font-weight: bold; text-align: center; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 4px; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     PRINT FORM (hidden on screen, used by html2pdf)
     ══════════════════════════════════════════ -->
<div id="print-form">
  <!-- filled by JS -->
</div>

<!-- ══════════════════════════════════════════
     APP UI
     ══════════════════════════════════════════ -->
<div id="app-header">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
    <div>
      <div id="header-eyebrow">Run Report</div>
      <div id="header-title">Aurelius Fire &amp; Rescue</div>
      <div id="header-sub">Loading…</div>
    </div>
    <button id="reload-btn" title="Reload personnel roster" onclick="reloadPersonnel()"
      style="background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.35);
             color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;
             white-space:nowrap;margin-top:6px;flex-shrink:0;font-family:Georgia,serif">
      🔄 Reload Roster
    </button>
  </div>
  <div id="tab-bar"></div>
</div>

<div id="content">
  <div id="tab-content"></div>
  <div id="nav-row"></div>
  <button class="btn-clear" onclick="clearForm()">Clear all form data</button>
</div>

<script>
// ══════════════════════════════
// DATA — PERSONNEL loaded from personnel.json
// ══════════════════════════════
let PERSONNEL = [];  // filled by loadPersonnel()

// Fallback roster used if personnel.json cannot be fetched
const PERSONNEL_FALLBACK = [
  {name:"Anthony, Robert",  badge:"8",   qual:"int"},
  {name:"Bacon, Jason",     badge:"80",  qual:"int"},
  {name:"Batis, Jeffery",   badge:"137", qual:""},
  {name:"Bench, Tyler",     badge:"116", qual:"int"},
  {name:"Bodoh, Lori",      badge:"88",  qual:"emt/int"},
  {name:"Burns, Jim",       badge:"109", qual:"int"},
  {name:"Burtless, John",   badge:"16",  qual:""},
  {name:"Butler, Mitchell", badge:"124", qual:"int"},
  {name:"Ely, Fred",        badge:"135", qual:""},
  {name:"Farrance, James",  badge:"128", qual:"int"},
  {name:"Foster, Barrie-Lyn",badge:"46", qual:"emt/int"},
  {name:"Foster, Craig",    badge:"21",  qual:"int"},
  {name:"Foster, Kevin",    badge:"23",  qual:"emt/int"},
  {name:"Froio, Samuel",    badge:"135", qual:""},
  {name:"Fronce, Ryan",     badge:"131", qual:"int"},
  {name:"George, Michael",  badge:"110", qual:"int"},
  {name:"Hultz, Kyle",      badge:"43",  qual:"int"},
  {name:"Hultz, Ryan",      badge:"41",  qual:"int"},
  {name:"Jackson, Luke",    badge:"132", qual:"int"},
  {name:"Jackson, Matt",    badge:"108", qual:""},
  {name:"Jakaub, Stan",     badge:"117", qual:"int"},
  {name:"Lamaster, John Jr.",badge:"49", qual:"int"},
  {name:"Marriott, Michael",badge:"111", qual:"int"},
  {name:"McNabb, Tim",      badge:"121", qual:"emt/int"},
  {name:"Parker, David",    badge:"102", qual:"emt/int"},
  {name:"Perkins, David",   badge:"53",  qual:"emt/int"},
  {name:"Rodriguez, Luis",  badge:"125", qual:"emt/int"},
  {name:"Salato, Vincent",  badge:"126", qual:"int"},
  {name:"Shaw, Andrew",     badge:"133", qual:"int"},
  {name:"Shaw, John",       badge:"123", qual:"int"},
  {name:"Thurston, Brad",   badge:"131", qual:"emt"},
  {name:"Thurston, Christine",badge:"119",qual:"emt"},
  {name:"Thurston, Ken Sr.",badge:"66",  qual:"int"},
  {name:"Thurston, Kevin",  badge:"129", qual:"int"},
  {name:"Thurston, Richard",badge:"114", qual:"int"},
  {name:"Thurston, Rob Jr.",badge:"100", qual:"emt/int"},
  {name:"Walborn, George Jr.",badge:"91",qual:"int"},
  {name:"Walczyk, Tom",     badge:"70",  qual:"int"},
  {name:"Wells, Jason",     badge:"120", qual:"int"},
];

async function loadPersonnel() {
  try {
    const res = await fetch('personnel.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      PERSONNEL = data.map(p => ({
        name: String(p.name||'').trim(),
        badge: String(p.badge||'').trim(),
        qual: String(p.qual||'').trim().toLowerCase(),
      })).filter(p => p.name && p.badge);
      PERSONNEL.sort((a,b) => a.name.localeCompare(b.name));
      console.log(`Loaded ${PERSONNEL.length} personnel from personnel.json`);
      return;
    }
  } catch(e) {
    console.warn('Could not load personnel.json, using built-in roster:', e.message);
  }
  PERSONNEL = [...PERSONNEL_FALLBACK];
};

const AMB_SERVICES = ["AMR","THROOP","FLEMING","Cayuga","Other"];

const DISPATCH_TYPES = [
  {code:"311",label:"Medical assist"},
  {code:"321",label:"EMS call"},
  {code:"322",label:"MVA"},
  {code:"324",label:"MVA no injuries"},
  {code:"350",label:"RIT call"},
  {code:"411",label:"Liquid spill"},
  {code:"813",label:"Wind/Storm"},
  {code:"611",label:"Canceled en route"},
  {code:"444",label:"Power line down"},
  {code:"561",label:"Unauthorized burning"},
  {code:"700",label:"False alarm"},
];
const DISPATCH_SPECIAL = [
  {code:"STR",label:"Structure fire:"},
  {code:"VEH",label:"Vehicle fire:"},
  {code:"OUT",label:"Outdoor fire:"},
  {code:"ELE",label:"Electrical problem:"},
  {code:"OTH",label:"Other:"},
];

const LOCATIONS = [
  {code:"121",label:"Gym"},       {code:"131",label:"Church"},
  {code:"161",label:"Restaurant"},{code:"162",label:"Bar"},
  {code:"816",label:"Farm"},      {code:"891",label:"Warehouse"},
  {code:"962",label:"Residential street"},{code:"965",label:"Vehicle parking area"},
  {code:"519",label:"Grocery Store"},{code:"559",label:"HD, Dicks, Petco"},
  {code:"581",label:"Mall, Kohls"},{code:"700",label:"Manufacturing"},
  {code:"210",label:"School"},    {code:"321",label:"ARC/IRA"},
  {code:"419",label:"1-2 Family Dwelling"},{code:"512",label:"Convenience Store"},
];

const APPARATUS = ["Rescue 2","Engine 1","Engine 2","Rescue 1","Chief's Vehicle","Quint 1","Squad 1","Squad 2","Squad 3","Tanker 1"];
const TABS = ["Incident","Times","Dispatch","Apparatus","Personnel","MVA","EMS","Remarks","Preview"];

const EMPTY = {
  date:"", runNum:"15-", ic:"", enteredBy:"", badge:"", entryDate:"",
  disp:"", enroute:"", arrived:"", clear:"", inQ:"",
  dispType:"", dispDetail:"", dispActual:"", locCode:"", address:"",
  apparatus:{}, apparatusDriver:{}, personnel:{},
  emtCt:"", intCt:"", totalCt:"",
  injName:"", injNum:"", rptFiled:"",
  amb:[{svc:"",custom:"",als:""},{svc:"",custom:"",als:""},{svc:"",custom:"",als:""}],
  pcr:"",
  law:["","",""],
  cars:[{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""}],
  mutual:"", remarks:"", reportBy:"", pg:"1", pgOf:"1",
};

// ══════════════════════════════
// STATE
// ══════════════════════════════
let tab = 0;
let F = loadForm();

function loadForm() {
  try {
    const s = localStorage.getItem("afr_v4");
    if (s) return Object.assign({}, EMPTY, JSON.parse(s));
  } catch(e) {}
  return Object.assign({}, EMPTY);
}

function saveForm() {
  try { localStorage.setItem("afr_v4", JSON.stringify(F)); } catch(e) {}
}

function clearForm() {
  if (!confirm("Clear all form data and start fresh?")) return;
  F = Object.assign({}, EMPTY,{
    amb:[{svc:"",custom:"",als:""},{svc:"",custom:"",als:""},{svc:"",custom:"",als:""}],
    law:["","",""],
    cars:[{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""}],
    apparatus:{}, personnel:{},
  });
  try { localStorage.removeItem("afr_v4"); } catch(e) {}
  render();
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === 'onclick') el.addEventListener('click', v);
    else if (k === 'onchange') el.addEventListener('change', v);
    else if (k === 'oninput') el.addEventListener('input', v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else if (k === 'class') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function lbl(text) {
  const d = document.createElement('div');
  d.className = 'lbl';
  d.textContent = text;
  return d;
}

function inp(value, onInput, opts={}) {
  const el = document.createElement('input');
  el.type = opts.type || 'text';
  el.value = value || '';
  el.placeholder = opts.placeholder || '';
  el.className = 'inp';
  if (opts.style) Object.assign(el.style, opts.style);
  el.addEventListener('input', e => { onInput(e.target.value); });
  return el;
}

function sel(value, options, onChange, style={}) {
  const el = document.createElement('select');
  el.className = 'sel';
  Object.assign(el.style, style);
  for (const [v, t] of options) {
    const o = document.createElement('option');
    o.value = v; o.textContent = t;
    if (v === value) o.selected = true;
    el.appendChild(o);
  }
  el.addEventListener('change', e => onChange(e.target.value));
  return el;
}

function card(title, ...children) {
  const c = document.createElement('div');
  c.className = 'card';
  if (title) {
    const t = document.createElement('div');
    t.className = 'card-title';
    t.textContent = title;
    c.appendChild(t);
  }
  const b = document.createElement('div');
  b.className = 'card-body';
  for (const child of children.flat()) {
    if (child) b.appendChild(child);
  }
  c.appendChild(b);
  return c;
}

function field(labelText, inputEl, mb=10) {
  const w = document.createElement('div');
  w.className = 'field-row';
  w.style.marginBottom = mb+'px';
  w.appendChild(lbl(labelText));
  w.appendChild(inputEl);
  return w;
}

function flexRow(...children) {
  const d = document.createElement('div');
  d.className = 'flex-row';
  for (const c of children) if (c) d.appendChild(c);
  return d;
}

function flexCol(flex, ...children) {
  const d = document.createElement('div');
  d.style.flex = flex;
  for (const c of children) if (c) d.appendChild(c);
  return d;
}

function toggle(labelText, subText, isOn, onToggle) {
  const d = document.createElement('div');
  d.className = 'toggle' + (isOn ? ' on' : '');

  const box = document.createElement('div');
  box.className = 'toggle-box';
  box.textContent = '✓';

  const textWrap = document.createElement('div');
  const tl = document.createElement('div');
  tl.className = 'toggle-label';
  tl.textContent = labelText;
  textWrap.appendChild(tl);
  if (subText) {
    const ts = document.createElement('div');
    ts.className = 'toggle-sub';
    ts.textContent = subText;
    textWrap.appendChild(ts);
  }

  d.appendChild(box);
  d.appendChild(textWrap);
  d.addEventListener('click', () => onToggle(!isOn));
  return d;
}

function timeInput(labelText, value, onChange) {
  const w = document.createElement('div');
  w.style.flex = '1';
  w.appendChild(lbl(labelText));
  const i = inp(value, onChange, {type:'time'});
  w.appendChild(i);
  return w;
}

function ambRow(i) {
  const a = F.amb[i];
  const wrap = document.createElement('div');

  const svcOpts = [["","— Select —"], ...AMB_SERVICES.map(s=>[s,s])];
  wrap.appendChild(lbl('Service'));
  const svcSel = sel(a.svc, svcOpts, v => {
    F.amb[i] = {...F.amb[i], svc:v, custom:""};
    saveForm();
    renderTab();
  }, {marginBottom:'8px'});
  wrap.appendChild(svcSel);

  if (a.svc === 'Other') {
    wrap.appendChild(lbl('Enter Name'));
    const ci = inp(a.custom, v => { F.amb[i].custom = v; saveForm(); }, {placeholder:'Service name', style:{marginBottom:'8px'}});
    wrap.appendChild(ci);
  }

  wrap.appendChild(lbl('ALS?'));
  const alsSel = sel(a.als, [["","—"],["YES","YES"],["NO","NO"]], v => {
    F.amb[i].als = v; saveForm();
  });
  wrap.appendChild(alsSel);
  return wrap;
}

// ══════════════════════════════
// TABS
// ══════════════════════════════
function tabIncident() {
  const wrap = document.createElement('div');

  // Helper: native date input that displays as MM/DD/YYYY on mobile
  function dateInp(value, onChange) {
    const el = document.createElement('input');
    el.type = 'date';
    el.className = 'inp';
    el.value = value || '';
    // Force numeric keyboard on mobile and keep it compact
    el.setAttribute('inputmode', 'numeric');
    Object.assign(el.style, { fontSize:'16px', padding:'9px 8px' });
    el.addEventListener('change', e => onChange(e.target.value));
    return el;
  }

  wrap.appendChild(card('Incident Info',
    field('Date', dateInp(F.date, v=>{F.date=v;saveForm();updateHeader();}), 10),

// ── Time helpers ────────────────────────────────────────
function timeDiff(t1, t2) {
  // returns "X min" difference between two HH:MM strings, or '' if invalid
  if (!t1 || !t2) return '';
  const [h1,m1] = t1.split(':').map(Number);
  const [h2,m2] = t2.split(':').map(Number);
  if (isNaN(h1)||isNaN(m1)||isNaN(h2)||isNaN(m2)) return '';
  let diff = (h2*60+m2) - (h1*60+m1);
  if (diff < 0) diff += 1440; // crosses midnight
  if (diff === 0) return '';
  return `${diff} min`;
}

function makeTimeField(labelText, storeKey, prevKey) {
  const row = document.createElement('div');
  Object.assign(row.style, { display:'flex', alignItems:'center', gap:'10px', marginBottom:'12px' });

  // Label column
  const labelCol = document.createElement('div');
  Object.assign(labelCol.style, { width:'110px', flexShrink:'0' });
  const l = document.createElement('div');
  l.className = 'lbl';
  l.textContent = labelText;
  labelCol.appendChild(l);

  // Input
  const el = document.createElement('input');
  el.type = 'text';
  el.inputMode = 'numeric';
  el.className = 'inp';
  el.value = F[storeKey] || '';
  el.placeholder = 'HH:MM';
  Object.assign(el.style, { flex:'1', fontSize:'18px', fontWeight:'600', letterSpacing:'0.05em', textAlign:'center' });
  el.addEventListener('input', e => {
    let v = e.target.value.replace(/[^0-9]/g,'');
    if (v.length > 4) v = v.slice(0,4);
    // auto-insert colon
    if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2);
    el.value = v;
    F[storeKey] = v;
    saveForm();
    updateDiff();
  });

  // Diff badge
  const diffBadge = document.createElement('div');
  Object.assign(diffBadge.style, {
    minWidth:'54px', textAlign:'center', fontSize:'12px', fontWeight:'700',
    background:'#fff3cd', border:'1px solid #c8a97a', borderRadius:'6px',
    padding:'4px 6px', color:'#5a3e00', flexShrink:'0'
  });

  function updateDiff() {
    if (prevKey) {
      const d = timeDiff(F[prevKey], F[storeKey]);
      diffBadge.textContent = d ? '+'+d : '—';
      diffBadge.style.background = d ? '#d4edda' : '#f5f5f5';
      diffBadge.style.color = d ? '#155724' : '#999';
    }
  }
  updateDiff();

  row.appendChild(labelCol);
  row.appendChild(el);
  if (prevKey) row.appendChild(diffBadge);
  return row;
}

function chkHtml(on) {
  return `<span class="chkbox${on?' on':''}">${on?'X':''}</span>`;
}
function ambName(a) {
  return a.svc === 'Other' ? (a.custom||'Other') : a.svc;
}

function timeDiffStr(t1, t2) {
  if (!t1 || !t2) return '';
  const parse = t => { const p=t.split(':'); return parseInt(p[0]||0)*60+parseInt(p[1]||0); };
  let d = parse(t2) - parse(t1);
  if (d < 0) d += 1440;
  return d > 0 ? `+${d} min` : '';
}

    <!-- Counts -->

      <td style="width:25%"><span class="bl">EMT's:</span> ${displayEmt}</td>
      <td style="width:25%"><span class="bl">Interior Firefighters:</span> ${displayInt}</td>
      <td style="width:30%"><span class="bl">Total Personnel on Call:</span> ${displayTotal}</td>
      <td><span class="bl">Page:</span> ${F.pg} of ${F.pgOf}</td>
    </tr></tbody></table>

    <!-- Injured -->
    <table><tbody><tr>
      <td style="width:38%"><span class="bl">PERSONNEL INJURED — Name:</span> ${F.injName}</td>
      <td style="width:18%"><span class="bl">Number:</span> ${F.injNum}</td>
      <td><span class="bl">Report Filed:</span> YES___ NO___${F.rptFiled?' <b>'+F.rptFiled+'</b>':''}</td>
    </tr></tbody></table>

    <!-- Remarks -->
    <div class="sec-hdr">REMARKS — CAUSE OF INCIDENT, EXTENT OF DAMAGE, INSURANCE CARRIER</div>
    <div class="remarks-box">${F.remarks||''}</div>

    <!-- MVA -->
    <div class="sec-hdr">MVA</div>
    <table><tbody>${mvaRows}</tbody></table>

    <!-- Mutual Aid -->
    <table style="margin-top:4px"><tbody><tr>
      <td><span class="bl">MUTUAL AID GIVEN OR RECEIVED:</span> ${F.mutual}</td>
    </tr></tbody></table>

    <!-- Ambulance -->
    <div class="sec-hdr">AMBULANCE USED</div>
    <table><tbody><tr style="font-size:8pt">${ambCells}</tr></tbody></table>

    <!-- PCR -->
    <table><tbody><tr>
      <td><span class="bl">PCR NUMBERS:</span> ${F.pcr}</td>
    </tr></tbody></table>

    <!-- Law -->
    <div class="sec-hdr">LAW ENFORCEMENT</div>
    <table><tbody><tr style="font-size:8pt">${lawCells}</tr></tbody></table>

    <!-- Personnel -->
    <div class="sec-hdr">PERSONNEL ON SCENE</div>
    <div class="pers-wrap">${persHtml}</div>

    <!-- Footer -->
    <div class="footer-row">
      <span><b>REPORT BY SIGN:</b> ${F.reportBy||'_________________________________'}</span>
      <span><b>PAGE:</b> ${F.pg} OF ${F.pgOf}</span>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page2" style="page-break-before:always">
    <div class="page2-title">Aurelius Fire and Rescue</div>
    <table style="border-collapse:collapse;width:100%;margin-bottom:6pt">
      <tbody>${p2Rows}</tbody>
    </table>
    <div style="border-top:1px solid #000;padding-top:6pt;font-size:8pt;font-family:Arial,sans-serif">
      <b>Report by</b> ${F.reportBy||'_________________________________'}
    </div>
  </div>
  `;
}

function generatePDF() {
  const container = document.getElementById('print-form');
  container.innerHTML = buildPrintHTML();
  container.style.display = 'block';

  const fn = `AureliusRunReport_${(F.runNum||'').replace(/[^a-z0-9]/gi,'_')}_${(F.date||'').replace(/-/g,'')}.pdf`;

  if (typeof html2pdf === 'undefined') {
    alert('PDF library not loaded. Please check your internet connection and try again.');
    container.style.display = 'none';
    return;
  }

  html2pdf().set({
    margin: [0.3, 0.3, 0.3, 0.3],
    filename: fn,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  }).from(container).save().then(() => {
    container.style.display = 'none';
  });
}

// ══════════════════════════════
// RENDER
// ══════════════════════════════
function updateHeader() {
  document.getElementById('header-sub').textContent =
    `#${F.runNum||'—'} · ${F.date||'No date set'}`;
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  TABS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===tab?' active':'');
    btn.textContent = t;
    btn.addEventListener('click', () => { tab=i; render(); });
    bar.appendChild(btn);
  });
}

function renderTab() {
  const tc = document.getElementById('tab-content');
  tc.innerHTML = '';
  const builders = [tabIncident,tabTimes,tabDispatch,tabApparatus,tabPersonnel,tabMVA,tabEMS,tabRemarks,tabPreview];
  tc.appendChild(builders[tab]());
}

function renderNav() {
  const nav = document.getElementById('nav-row');
  nav.innerHTML = '';
  if (tab > 0) {
    const back = document.createElement('button');
    back.className = 'btn-back';
    back.textContent = '← Back';
    back.addEventListener('click', () => { tab--; render(); });
    nav.appendChild(back);
  }
  const save = document.createElement('button');
  save.className = 'btn-save';
  save.textContent = '💾 Save';
  save.addEventListener('click', () => {
    saveForm();
    save.textContent = '✓ Saved';
    save.classList.add('saved');
    setTimeout(() => { save.textContent='💾 Save'; save.classList.remove('saved'); }, 2000);
  });
  nav.appendChild(save);
  if (tab < TABS.length-1) {
    const next = document.createElement('button');
    next.className = 'btn-next';
    next.textContent = 'Next →';
    next.addEventListener('click', () => { tab++; render(); });
    nav.appendChild(next);
  }
}

function render() {
  updateHeader();
  renderTabBar();
  renderTab();
  renderNav();
}

// ── Reload personnel roster on demand ──────────────────
async function reloadPersonnel() {
  const btn = document.getElementById('reload-btn');
  const orig = btn.textContent;
  btn.textContent = '⏳ Loading…';
  btn.disabled = true;
  try {
    await loadPersonnel();
    btn.textContent = '✓ Updated!';
    btn.style.background = 'rgba(45,106,45,0.7)';
    // Re-render current tab in case Personnel tab is open
    renderTab();
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = 'rgba(255,255,255,0.15)';
      btn.disabled = false;
    }, 2000);
  } catch(e) {
    btn.textContent = '✗ Failed';
    btn.style.background = 'rgba(139,0,0,0.5)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = 'rgba(255,255,255,0.15)';
      btn.disabled = false;
    }, 2500);
  }
}

// Show a loading state then boot once personnel are ready
document.getElementById('header-sub').textContent = 'Loading roster…';
loadPersonnel().then(() => {
  F = loadForm();
  render();
});
</script>
